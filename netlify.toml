[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://images.unsplash.com https://vlojfdgcbokneeammddo.supabase.co; connect-src 'self' https://vlojfdgcbokneeammddo.supabase.co https://www.googletagmanager.com; frame-ancestors 'none';"

# Sitemap proxy - deve vir ANTES do catch-all
[[redirects]]
  from = "/sitemap.xml"
  to = "https://vlojfdgcbokneeammddo.supabase.co/functions/v1/sitemap"
  status = 200
  force = true

# SPA catch-all
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
